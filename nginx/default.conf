server {
    listen 80;
    server_name localhost;

    # Directorio raíz de Laravel
    root /var/www/html/public;

    index index.php index.html;

    # ==========================
    # Servir assets estáticos (JS/CSS/images) compilados
    # ==========================
    location /build/ {
        # Sirve los archivos compilados por Vite/Tailwind
        alias /var/www/html/public/build/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }


    # ==========================
    # Laravel PHP
    # ==========================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass app:9000;       # Aquí se conecta al contenedor PHP-FPM
        fastcgi_index index.php;
    }

    # ==========================
    # Seguridad / Headers
    # ==========================
    location ~ /\.ht {
        deny all;
    }
}
